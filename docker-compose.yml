      KafkaTopics__ContentCreatedTopic: ${KafkaTopics__ContentCreatedTopic:-content_created}
      KafkaTopics__ContentUpdatedTopic: ${KafkaTopics__ContentUpdatedTopic:-content_updated}
      KafkaTopics__ContentDeletedTopic: ${KafkaTopics__ContentDeletedTopic:-content_deleted}
      KafkaTopics__HashtagEventsTopic: ${KafkaTopics__HashtagEventsTopic:-hashtag_events}
    depends_on:
