      KafkaTopics__ContentCreatedTopic: ${KafkaTopics__ContentCreatedTopic:-content_created}
      KafkaTopics__ContentDeletedTopic: ${KafkaTopics__ContentDeletedTopic:-content_deleted}
    depends_on:
