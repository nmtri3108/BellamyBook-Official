  # ---------------------------------------------------------------------------
  # FRONTEND (build uses dockerProd/.env.frontend copied as .env in image)
  # ---------------------------------------------------------------------------
  frontend:
    image: ${DOCKER_REGISTRY}/bellamybook-frontend:${IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-frontend
    restart: unless-stopped
    environment:
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-}
      DOCS_PUBLIC_URL: ${DOCS_PUBLIC_URL:-}
      Minio__PublicUrl: ${Minio__PublicUrl:-}
    # Use 8081 so Traefik can bind to 80; without Traefik use http://localhost:8081
    ports:
      - "8081:80"
    networks:
      - appnet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${TRAEFIK_FRONTEND_HOST:-bellamybook.com}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.service=frontend"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend-secure.rule=Host(`${TRAEFIK_FRONTEND_HOST:-bellamybook.com}`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.service=frontend"
      - "traefik.http.routers.frontend-secure.tls=true"

  # ---------------------------------------------------------------------------
  # ADMIN (build uses dockerProd/.env.admin copied as .env in image)
  # ---------------------------------------------------------------------------
  admin:
    image: ${DOCKER_REGISTRY}/bellamybook-admin:${IMAGE_TAG}
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-admin
    restart: unless-stopped
    environment:
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-}
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-}
      Minio__PublicUrl: ${Minio__PublicUrl:-}
    # Use 8084 so Traefik can use 8080 for dashboard; without Traefik use http://localhost:8084
    ports:
      - "8084:80"
    networks:
      - appnet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${TRAEFIK_ADMIN_HOST:-admin.bellamybook.com}`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.routers.admin.service=admin"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
      - "traefik.http.routers.admin-secure.rule=Host(`${TRAEFIK_ADMIN_HOST:-admin.bellamybook.com}`)"
      - "traefik.http.routers.admin-secure.entrypoints=websecure"
      - "traefik.http.routers.admin-secure.service=admin"
      - "traefik.http.routers.admin-secure.tls=true"

  # ---------------------------------------------------------------------------
  # MONITORING (optional profile: docker compose --profile monitoring up -d)
  # No application code changes required.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - appnet
    profiles:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`${TRAEFIK_PROMETHEUS_HOST:-prometheus.bellamybook.com}`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.routers.prometheus.service=prometheus"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus-secure.rule=Host(`${TRAEFIK_PROMETHEUS_HOST:-prometheus.bellamybook.com}`)"
      - "traefik.http.routers.prometheus-secure.entrypoints=websecure"
      - "traefik.http.routers.prometheus-secure.service=prometheus"
      - "traefik.http.routers.prometheus-secure.tls=true"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - appnet
    depends_on:
      - prometheus
    profiles:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${TRAEFIK_GRAFANA_HOST:-grafana.bellamybook.com}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.service=grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana-secure.rule=Host(`${TRAEFIK_GRAFANA_HOST:-grafana.bellamybook.com}`)"
      - "traefik.http.routers.grafana-secure.entrypoints=websecure"
      - "traefik.http.routers.grafana-secure.service=grafana"
      - "traefik.http.routers.grafana-secure.tls=true"

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - appnet
    profiles:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8083:8080"
    networks:
      - appnet
    profiles:
      - monitoring

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ${COMPOSE_PROJECT_NAME:-bellamybook}-uptime-kuma
    restart: unless-stopped
    environment:
      UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN: "1"
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - appnet
    profiles:
      - monitoring
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`${TRAEFIK_UPTIME_KUMA_HOST:-uptime.bellamybook.com}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=web"
      - "traefik.http.routers.uptime-kuma.service=uptime-kuma"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
      - "traefik.http.routers.uptime-kuma-secure.rule=Host(`${TRAEFIK_UPTIME_KUMA_HOST:-uptime.bellamybook.com}`)"
      - "traefik.http.routers.uptime-kuma-secure.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma-secure.service=uptime-kuma"
      - "traefik.http.routers.uptime-kuma-secure.tls=true"

volumes:
  traefik_logs:
  traefik_letsencrypt:
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
  pg_primary_data:
  pg_replica_data:
  redis_data:
  mongo_data:
  mongo_keyfile:
  rabbitmq_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  elasticsearch_data:
  minio_data:
  neo4j_data:
  neo4j_logs:

networks:
  appnet:
    driver: bridge
